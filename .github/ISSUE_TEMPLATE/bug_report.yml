name: Bug report
description: Report a confirmed defect.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who is affected and how severe is it?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide deterministic steps and expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include environment, logs, screenshots, or request IDs.
