name: Engineering task
description: Track platform or feature engineering work.
title: "[Task]: "
labels: ["engineering", "triage"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What should be true when this is complete?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Include constraints, affected areas, and non-goals.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List measurable checks.
